<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業投資分析系統 - 視覺化與復原增強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .pos-text { color: #dc2626; font-weight: bold; } 
        .neg-text { color: #16a34a; font-weight: bold; }
        .btn-action { @apply flex items-center gap-1 px-3 py-2 rounded-lg text-xs font-bold transition-all; }
        canvas { max-height: 250px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 flex items-center tracking-tighter">
                    <i data-lucide="line-chart" class="mr-3 text-indigo-600 w-8 h-8"></i>
                    台股資產決策系統 <span class="ml-3 text-[10px] bg-indigo-600 text-white px-2 py-1 rounded">V10.0 PRO</span>
                </h1>
                <p class="text-slate-500 font-medium mt-1">10年顧問邏輯：配置透明化、決策數據化</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <!-- Undo Button -->
                <button onclick="undo()" id="undo-btn" class="btn-action bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed">
                    <i data-lucide="undo-2" class="w-4 h-4"></i> 復原上一步
                </button>
                
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-widest">總投資本金</span>
                    <input type="number" id="manual-capital" onchange="saveCapital()" class="text-lg font-black outline-none w-28 bg-transparent" value="1000000">
                </div>
                
                <label class="bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold flex items-center cursor-pointer hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                    <i data-lucide="file-up" class="mr-2 w-5 h-5"></i>
                    批次匯入交易
                    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls, .csv">
                </label>
            </div>
        </header>

        <!-- KPI Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-6 border-b-4 border-slate-300">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">持倉總成本 (加權)</div>
                <div id="total-inventory-cost" class="text-3xl font-black text-slate-800">$0</div>
            </div>
            <div class="card p-6 border-b-4 border-indigo-600">
                <div class="text-slate-400 text-xs font-bold mb-1 flex justify-between">
                    已實現損益總計 <span id="global-range-label" class="text-[10px] bg-indigo-50 text-indigo-600 px-2 rounded-full">全部紀錄</span>
                </div>
                <div id="realized-pnl" class="text-3xl font-black">$0</div>
            </div>
            <div class="card p-6 border-b-4 border-slate-300">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">總投資報酬率</div>
                <div id="total-roi" class="text-3xl font-black">0%</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-6">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center"><i data-lucide="pie-chart" class="mr-2 w-4 h-4"></i> 投資組合佔比 (依成本)</h3>
                <div class="relative h-[250px] flex justify-center">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center"><i data-lucide="bar-chart-2" class="mr-2 w-4 h-4"></i> 個股獲利表現 (已實現)</h3>
                <div class="relative h-[250px]">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Left: Sidebar -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-6">
                    <h3 class="font-bold mb-4 flex items-center text-slate-700 text-sm"><i data-lucide="edit-3" class="mr-2 w-4 h-4"></i> 單筆交易登錄</h3>
                    <form id="tx-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="symbol" required oninput="autoName(this.value)" class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none focus:ring-2 ring-indigo-100" placeholder="代號">
                            <input type="text" id="name" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none focus:ring-2 ring-indigo-100" placeholder="名稱">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="type" class="w-full border rounded-lg px-2 py-2 text-xs font-bold bg-white outline-none">
                                <option value="buy">買入</option>
                                <option value="sell">賣出</option>
                            </select>
                            <input type="date" id="date" required class="w-full border rounded-lg px-2 py-2 text-[10px] font-bold outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="price" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none" placeholder="單價">
                            <input type="number" id="qty" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none" placeholder="股數">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">新增至帳本</button>
                    </form>
                </div>

                <div class="card p-6 bg-slate-50 border-dashed border-2">
                    <h3 class="font-bold mb-2 text-slate-500 text-[10px] uppercase tracking-widest">全局時間篩選</h3>
                    <div class="space-y-2">
                        <input type="date" id="filter-start" onchange="updateUI()" class="w-full border rounded-lg px-2 py-1.5 text-xs outline-none">
                        <input type="date" id="filter-end" onchange="updateUI()" class="w-full border rounded-lg px-2 py-1.5 text-xs outline-none">
                        <button onclick="resetGlobalDates()" class="text-[10px] text-indigo-600 font-bold hover:underline">顯示全部時間</button>
                    </div>
                </div>
                
                <button onclick="clearSystem()" class="w-full text-[10px] text-slate-300 hover:text-red-500 transition underline">清除系統所有資料</button>
            </div>

            <!-- Main Panel -->
            <div class="lg:col-span-3 space-y-8">
                
                <!-- Inventory -->
                <div class="card p-6">
                    <h3 class="font-black text-slate-800 mb-4 flex items-center text-lg"><i data-lucide="layers" class="mr-2 w-5 h-5 text-slate-400"></i> 持股配置現況</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-slate-400 border-b">
                                <tr>
                                    <th class="pb-4 px-2">股票</th>
                                    <th class="pb-4 px-2 text-right">持有股數</th>
                                    <th class="pb-4 px-2 text-right">平均成本</th>
                                    <th class="pb-4 px-2 text-right">配置成本</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Detailed History with Filter -->
                <div class="card p-6">
                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                        <h3 class="font-black text-slate-800 flex items-center text-lg"><i data-lucide="database" class="mr-2 w-5 h-5 text-slate-400"></i> 交易深度查詢</h3>
                        
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                                <input type="text" id="hist-search" oninput="updateUI()" placeholder="搜尋代號/名稱..." class="pl-9 pr-4 py-2 border rounded-full text-xs w-40 focus:ring-2 ring-indigo-50 outline-none">
                            </div>
                            <div class="flex items-center gap-1 bg-slate-100 px-3 py-1.5 rounded-full">
                                <span class="text-[9px] font-bold text-slate-500">精準比對</span>
                                <input type="checkbox" id="exact-match" onchange="updateUI()" class="w-3 h-3">
                            </div>
                            <select id="hist-type" onchange="updateUI()" class="border rounded-full px-3 py-1.5 text-[10px] outline-none bg-white font-bold">
                                <option value="all">全部類型</option>
                                <option value="buy">買入</option>
                                <option value="sell">賣出</option>
                            </select>
                        </div>
                    </div>

                    <!-- Search Result Card -->
                    <div id="search-summary" class="mb-6 bg-slate-900 text-white rounded-2xl p-5 flex items-center justify-between hidden">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1 block">篩選分析結果</span>
                            <div id="search-summary-title" class="text-xl font-black">-</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">已實現損益小計</span>
                            <div id="search-summary-pnl" class="text-2xl font-black">-</div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-[11px] text-left border-collapse">
                            <thead class="bg-slate-50 text-slate-400 border-b">
                                <tr>
                                    <th class="py-3 px-3 sort-header" onclick="setSort('date')">日期 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                    <th class="py-3 px-3 sort-header" onclick="setSort('name')">股票 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                    <th class="py-3 px-3 text-center">類型</th>
                                    <th class="py-3 px-3 text-right">價格/股數</th>
                                    <th class="py-3 px-3 sort-header text-right" onclick="setSort('pnl')">已實現損益 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                    <th class="py-3 px-3 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="history-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STOCK_MAP = { "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "1303": "南亞", "2408": "南亞科", "2881": "富邦金" };
        const KEYWORDS = {
            symbol: ['代號', '股票代號', '股號', 'Symbol'],
            name: ['名稱', '股票名稱', '公司名稱', 'Name'],
            type: ['類型', '動作', '交易類型', 'Type'],
            price: ['價格', '單價', '成交價', '成交單價', 'Price'],
            qty: ['股數', '數量', '張數', 'Qty'],
            date: ['日期', '交易日', 'Date']
        };

        let txs = JSON.parse(localStorage.getItem('undo_stocks_v10')) || [];
        let capital = parseFloat(localStorage.getItem('undo_capital_v10')) || 1000000;
        let historyStack = []; // 存放歷史狀態用於撤銷
        
        let currentSortColumn = 'date';
        let currentSortDir = 'desc';
        
        let allocationChart = null;
        let performanceChart = null;

        window.onload = () => {
            document.getElementById('manual-capital').value = capital;
            document.getElementById('date').valueAsDate = new Date();
            lucide.createIcons();
            saveHistoryState(); // 初始狀態
            updateUI();
        };

        // --- 核心復原邏輯 ---
        function saveHistoryState() {
            if (historyStack.length > 10) historyStack.shift();
            historyStack.push(JSON.stringify(txs));
            updateUndoBtn();
        }

        function undo() {
            if (historyStack.length > 1) {
                historyStack.pop(); // 彈出當前
                const prevState = JSON.parse(historyStack[historyStack.length - 1]);
                txs = prevState;
                syncStorage();
                updateUI();
                updateUndoBtn();
            }
        }

        function updateUndoBtn() {
            document.getElementById('undo-btn').disabled = (historyStack.length <= 1);
        }

        function syncStorage() {
            localStorage.setItem('undo_stocks_v10', JSON.stringify(txs));
        }

        function autoName(s) { if (STOCK_MAP[s]) document.getElementById('name').value = STOCK_MAP[s]; }
        function saveCapital() { capital = parseFloat(document.getElementById('manual-capital').value) || 0; localStorage.setItem('undo_capital_v10', capital); updateUI(); }
        function setSort(col) { if (currentSortColumn === col) { currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc'; } else { currentSortColumn = col; currentSortDir = 'desc'; } updateUI(); }
        function resetGlobalDates() { document.getElementById('filter-start').value = ""; document.getElementById('filter-end').value = ""; updateUI(); }

        // --- 數據清洗 ---
        function cleanNum(val) {
            if (typeof val === 'number') return val;
            const cleaned = val.toString().replace(/[^\d.-]/g, '');
            const parsed = parseFloat(cleaned);
            return isNaN(parsed) ? 0 : parsed;
        }

        // --- Excel Import ---
        document.getElementById('excel-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                    rows.forEach((row, idx) => {
                        const cleanRow = {};
                        Object.keys(row).forEach(k => cleanRow[k.toString().trim()] = row[k]);
                        const findVal = (keys) => {
                            const foundKey = Object.keys(cleanRow).find(rk => keys.some(kk => rk.includes(kk)));
                            return foundKey ? cleanRow[foundKey] : null;
                        };
                        const sym = (findVal(KEYWORDS.symbol) || "").toString().trim();
                        if (sym) {
                            const p = cleanNum(findVal(KEYWORDS.price));
                            const q = Math.abs(parseInt(cleanNum(findVal(KEYWORDS.qty))));
                            const rt = (findVal(KEYWORDS.type) || "").toString();
                            const type = (rt.includes("賣") || rt.toLowerCase().includes("sell")) ? 'sell' : 'buy';
                            let dt = findVal(KEYWORDS.date);
                            dt = dt instanceof Date ? dt.toISOString().split('T')[0] : (dt || new Date()).toString().replace(/\//g, '-');
                            txs.push({ id: Date.now() + idx, symbol: sym, name: (findVal(KEYWORDS.name) || STOCK_MAP[sym] || sym), type, date: dt, price: p, qty: q, fee: Math.max(1, Math.floor(p * q * 0.001425)), tax: type === 'sell' ? Math.floor(p * q * 0.003) : 0 });
                        }
                    });
                    saveHistoryState();
                    syncStorage();
                    updateUI();
                } catch (err) { alert("匯入失敗"); }
            };
            reader.readAsBinaryString(file);
        });

        document.getElementById('tx-form').onsubmit = (e) => {
            e.preventDefault();
            const p = parseFloat(document.getElementById('price').value);
            const q = parseInt(document.getElementById('qty').value);
            const type = document.getElementById('type').value;
            txs.push({ id: Date.now(), symbol: document.getElementById('symbol').value, name: document.getElementById('name').value, type, date: document.getElementById('date').value, price: p, qty: q, fee: Math.max(1, Math.floor(p * q * 0.001425)), tax: type === 'sell' ? Math.floor(p * q * 0.003) : 0 });
            saveHistoryState();
            syncStorage();
            updateUI(); e.target.reset();
        };

        // --- 核心 UI 更新與圖表繪製 ---
        function updateUI() {
            txs.sort((a,b) => new Date(a.date) - new Date(b.date));
            const portfolio = {};
            let dashboardRealized = 0;
            const fullHistory = [];

            const globalStart = document.getElementById('filter-start').value;
            const globalEnd = document.getElementById('filter-end').value;

            txs.forEach(t => {
                if (!portfolio[t.symbol]) portfolio[t.symbol] = { qty: 0, cost: 0, name: t.name, realized: 0 };
                const p = portfolio[t.symbol];
                let txPnl = null;

                if (t.type === 'buy') {
                    p.qty += t.qty;
                    p.cost += (t.price * t.qty) + t.fee;
                } else {
                    const avg = p.qty > 0 ? (p.cost / p.qty) : t.price;
                    txPnl = (t.price * t.qty) - t.fee - t.tax - (avg * t.qty);
                    p.realized += txPnl;
                    const tDate = new Date(t.date);
                    if ((!globalStart || tDate >= new Date(globalStart)) && (!globalEnd || tDate <= new Date(globalEnd))) {
                        dashboardRealized += txPnl;
                    }
                    p.qty -= t.qty;
                    p.cost -= (avg * t.qty);
                }
                fullHistory.push({ ...t, pnl: txPnl });
            });

            // 1. 庫存列表與圖表數據準備
            const invBody = document.getElementById('inventory-body');
            invBody.innerHTML = '';
            let totalInvCost = 0;
            const chartAllocLabels = [];
            const chartAllocData = [];
            const chartPerfLabels = [];
            const chartPerfData = [];

            Object.keys(portfolio).forEach(s => {
                const d = portfolio[s];
                if (d.qty > 0) {
                    totalInvCost += d.cost;
                    invBody.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4 px-2 font-bold">${d.name}<br><span class="text-[10px] text-slate-400 font-normal">${s}</span></td>
                            <td class="py-4 px-2 text-right font-medium">${d.qty.toLocaleString()}</td>
                            <td class="py-4 px-2 text-right text-slate-500">${(d.cost/d.qty).toFixed(2)}</td>
                            <td class="py-4 px-2 text-right font-bold text-slate-700">$${Math.round(d.cost).toLocaleString()}</td>
                        </tr>`;
                    chartAllocLabels.push(d.name);
                    chartAllocData.push(Math.round(d.cost));
                }
                if (Math.abs(d.realized) > 1) {
                    chartPerfLabels.push(d.name);
                    chartPerfData.push(Math.round(d.realized));
                }
            });

            // 2. 繪製圖表
            updateCharts(chartAllocLabels, chartAllocData, chartPerfLabels, chartPerfData);

            // 3. 歷史紀錄與搜尋
            const histKeyword = document.getElementById('hist-search').value.trim();
            const histType = document.getElementById('hist-type').value;
            const isExact = document.getElementById('exact-match').checked;

            let filtered = fullHistory.filter(t => {
                let mK = true;
                if (histKeyword) {
                    mK = isExact ? (t.name === histKeyword || t.symbol === histKeyword) : (t.symbol.includes(histKeyword) || t.name.includes(histKeyword));
                }
                const mT = histType === 'all' || t.type === histType;
                return mK && mT;
            });

            const searchSumPnl = filtered.reduce((s, t) => s + (t.pnl || 0), 0);
            const sumCard = document.getElementById('search-summary');
            if (histKeyword || histType !== 'all') {
                sumCard.classList.remove('hidden');
                document.getElementById('search-summary-title').innerText = histKeyword ? `分析標的: ${histKeyword}` : "自訂條件分析";
                const pnlEl = document.getElementById('search-summary-pnl');
                pnlEl.innerText = `$${Math.round(searchSumPnl).toLocaleString()}`;
                pnlEl.className = `text-2xl font-black ${searchSumPnl >= 0 ? 'text-indigo-400' : 'text-emerald-400'}`;
            } else { sumCard.classList.add('hidden'); }

            filtered.sort((a, b) => {
                let vA, vB;
                if (currentSortColumn === 'date') { vA = new Date(a.date); vB = new Date(b.date); }
                else if (currentSortColumn === 'name') { vA = a.name; vB = b.name; }
                else if (currentSortColumn === 'pnl') { vA = a.pnl || -9999999; vB = b.pnl || -9999999; }
                if (vA < vB) return currentSortDir === 'asc' ? -1 : 1;
                if (vA > vB) return currentSortDir === 'asc' ? 1 : -1;
                return 0;
            });

            const histBody = document.getElementById('history-body');
            histBody.innerHTML = '';
            filtered.forEach(t => {
                const pnlClass = t.pnl >= 0 ? 'pos-text' : 'neg-text';
                histBody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                        <td class="py-3 px-3 text-slate-500">${t.date}</td>
                        <td class="py-3 px-3 font-bold">${t.name}</td>
                        <td class="py-3 px-3 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${t.type==='buy'?'bg-rose-50 text-rose-500':'bg-emerald-50 text-emerald-600'}">${t.type==='buy'?'買入':'賣出'}</span></td>
                        <td class="py-3 px-3 text-right">${t.price} / ${t.qty}</td>
                        <td class="py-3 px-3 text-right font-bold ${t.pnl!==null?pnlClass:'text-slate-300'}">${t.pnl!==null?Math.round(t.pnl).toLocaleString():'-'}</td>
                        <td class="py-3 px-3 text-center"><button onclick="delTx(${t.id})" class="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button></td>
                    </tr>`;
            });

            // 更新看板
            document.getElementById('total-inventory-cost').innerText = `$${Math.round(totalInvCost).toLocaleString()}`;
            document.getElementById('realized-pnl').innerText = `$${Math.round(dashboardRealized).toLocaleString()}`;
            document.getElementById('realized-pnl').className = `text-3xl font-black ${dashboardRealized >= 0 ? 'pos-text' : 'neg-text'}`;
            const roi = capital > 0 ? (dashboardRealized / capital) * 100 : 0;
            document.getElementById('total-roi').innerText = `${roi.toFixed(2)}%`;
            document.getElementById('total-roi').className = `text-3xl font-black ${roi >= 0 ? 'pos-text' : 'neg-text'}`;
            lucide.createIcons();
        }

        function updateCharts(allocL, allocD, perfL, perfD) {
            const ctx1 = document.getElementById('allocationChart').getContext('2d');
            const ctx2 = document.getElementById('performanceChart').getContext('2d');

            if (allocationChart) allocationChart.destroy();
            if (performanceChart) performanceChart.destroy();

            allocationChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: allocL,
                    datasets: [{
                        data: allocD,
                        backgroundColor: ['#4f46e5', '#f43f5e', '#10b981', '#f59e0b', '#6366f1', '#ec4899', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });

            performanceChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: perfL,
                    datasets: [{
                        label: '已實現損益 ($)',
                        data: perfD,
                        backgroundColor: perfD.map(v => v >= 0 ? 'rgba(225, 29, 72, 0.7)' : 'rgba(16, 185, 129, 0.7)'),
                        borderRadius: 6
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } }, x: { grid: { display: false } } } }
            });
        }

        function delTx(id) { if (confirm('確定刪除紀錄？')) { saveHistoryState(); txs = txs.filter(t => t.id !== id); syncStorage(); updateUI(); } }
        function clearSystem() { if (confirm('注意！這將清除所有資料。')) { saveHistoryState(); txs = []; syncStorage(); updateUI(); } }
    </script>
</body>
</html>
