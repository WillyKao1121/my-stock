<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業投資分析系統 - 精簡匯出備份版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .pos-text { color: #dc2626; font-weight: bold; } 
        .neg-text { color: #16a34a; font-weight: bold; }
        .btn-range { @apply px-2 py-1 bg-white border border-slate-200 hover:bg-indigo-600 hover:text-white rounded-md text-[10px] font-bold transition-all shadow-sm; }
        .table-header { @apply py-3 px-3 text-slate-400 font-bold text-[10px] uppercase tracking-wider border-b cursor-pointer hover:bg-slate-50 transition; }
        canvas { max-height: 250px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 flex items-center tracking-tighter">
                    <i data-lucide="gem" class="mr-3 text-indigo-600 w-8 h-8"></i>
                    台股投資決策系統 <span class="ml-3 text-[10px] bg-indigo-600 text-white px-2 py-1 rounded tracking-widest font-bold">V13.1 LIGHT EXPORT</span>
                </h1>
                <p class="text-slate-500 font-medium mt-1">極簡化數據匯出 × 專業持股排序分析</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <button onclick="undo()" id="undo-btn" class="flex items-center gap-1 px-3 py-2 bg-white text-slate-600 border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 disabled:opacity-30 shadow-sm">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 復原
                </button>
                
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                    <span class="text-[9px] font-bold text-slate-400 uppercase mb-1">本金預算</span>
                    <input type="number" id="manual-capital" onchange="saveCapital()" class="text-lg font-black outline-none w-28 bg-transparent" value="1000000">
                </div>

                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-600 text-white px-5 py-4 rounded-2xl font-bold flex items-center hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">
                        <i data-lucide="download" class="mr-2 w-5 h-5"></i> 匯出備份
                    </button>
                    <label class="bg-slate-800 text-white px-5 py-4 rounded-2xl font-bold flex items-center cursor-pointer hover:bg-slate-700 transition shadow-lg shadow-slate-200">
                        <i data-lucide="file-up" class="mr-2 w-5 h-5"></i> 匯入交易
                        <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls, .csv">
                    </label>
                </div>
            </div>
        </header>

        <!-- KPI Scorecard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center md:text-left">
            <div class="card p-6 border-b-4 border-slate-200">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">目前持倉總成本</div>
                <div id="total-inventory-cost" class="text-3xl font-black text-slate-800">$0</div>
            </div>
            <div class="card p-6 border-b-4 border-indigo-600">
                <div class="text-slate-400 text-xs font-bold mb-1 flex justify-between items-center">
                    看板已實現損益 <span id="global-range-label" class="text-[10px] bg-indigo-50 text-indigo-600 px-2 rounded-full font-black">全部紀錄</span>
                </div>
                <div id="realized-pnl" class="text-3xl font-black">$0</div>
            </div>
            <div class="card p-6 border-b-4 border-slate-200">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest text-center">全局投資報酬率</div>
                <div id="total-roi" class="text-3xl font-black text-center">0%</div>
            </div>
        </div>

        <!-- Charts Container -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-6"><canvas id="allocationChart"></canvas></div>
            <div class="card p-6"><canvas id="performanceChart"></canvas></div>
        </div>

        <!-- Global Date Filter Quick Range -->
        <div class="card p-4 mb-8 bg-white border-l-4 border-indigo-500 flex flex-wrap items-center gap-4">
            <span class="text-sm font-black text-slate-700 uppercase tracking-tighter">快速切換看板區間:</span>
            <div class="flex items-center gap-2">
                <input type="date" id="filter-start" onchange="updateUI()" class="text-xs border rounded px-2 py-1.5 outline-none">
                <input type="date" id="filter-end" onchange="updateUI()" class="text-xs border rounded px-2 py-1.5 outline-none">
            </div>
            <div class="flex gap-1">
                <button onclick="setGlobalRange(3)" class="btn-range">3日</button>
                <button onclick="setGlobalRange(7)" class="btn-range">1週</button>
                <button onclick="setGlobalRange(30)" class="btn-range">1月</button>
                <button onclick="resetGlobalDates()" class="btn-range bg-slate-100 border-none">重置</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-6">
                    <h3 class="font-bold mb-4 text-slate-700 text-sm flex items-center"><i data-lucide="plus-circle" class="mr-2"></i> 新增單筆紀錄</h3>
                    <form id="tx-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="symbol" required oninput="autoName(this.value)" class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none focus:ring-2 ring-indigo-50" placeholder="代號">
                            <input type="text" id="name" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none focus:ring-2 ring-indigo-50" placeholder="名稱">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="type" class="w-full border rounded-lg px-2 py-2 text-xs font-bold bg-white outline-none">
                                <option value="buy">買入</option>
                                <option value="sell">賣出</option>
                            </select>
                            <input type="date" id="date" required class="w-full border rounded-lg px-2 py-2 text-[10px] font-bold outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="price" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none" placeholder="單價">
                            <input type="number" id="qty" required class="w-full border rounded-lg px-2 py-2 text-sm font-bold outline-none" placeholder="股數">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">加入帳本</button>
                    </form>
                </div>
                <button onclick="clearSystem()" class="w-full text-[10px] text-slate-300 hover:text-red-500 underline transition text-center block">清除所有資料</button>
            </div>

            <!-- Main Panel -->
            <div class="lg:col-span-3 space-y-8">
                <!-- Inventory List with Sorting -->
                <div class="card p-6">
                    <h3 class="font-black text-slate-800 mb-4 flex items-center text-lg"><i data-lucide="package" class="mr-2 w-5 h-5 text-slate-400"></i> 持股配置現況</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead>
                                <tr class="text-slate-400 border-b">
                                    <th class="table-header" onclick="setInvSort('name')">股票標的 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                    <th class="table-header text-right" onclick="setInvSort('qty')">持有股數 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                    <th class="table-header text-right">平均成本</th>
                                    <th class="table-header text-right" onclick="setInvSort('cost')">持有總成本 <i data-lucide="chevrons-up-down" class="inline w-3 h-3"></i></th>
                                </tr>
                            </thead>
                            <tbody id="inventory-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- History with Deep Filter -->
                <div class="card p-6">
                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                        <h3 class="font-black text-slate-800 flex items-center text-lg"><i data-lucide="history" class="mr-2 w-5 h-5 text-slate-400"></i> 歷史交易紀錄</h3>
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                                <input type="text" id="hist-search" oninput="updateUI()" placeholder="搜尋代號/名稱..." class="pl-9 pr-4 py-2 border rounded-full text-xs w-40 outline-none">
                            </div>
                            <div class="flex items-center gap-1 bg-slate-100 px-3 py-1 rounded-full">
                                <span class="text-[9px] font-bold text-slate-500">精準比對</span>
                                <input type="checkbox" id="exact-match" onchange="updateUI()" class="w-3 h-3">
                            </div>
                            <div class="flex items-center gap-1">
                                <input type="date" id="hist-start" onchange="updateUI()" class="border rounded px-1 py-1 text-[9px] outline-none">
                                <input type="date" id="hist-end" onchange="updateUI()" class="border rounded px-1 py-1 text-[9px] outline-none">
                            </div>
                        </div>
                    </div>

                    <div id="search-summary" class="mb-6 bg-slate-900 text-white rounded-2xl p-5 flex items-center justify-between hidden">
                        <div>
                            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">區域分析統計</span>
                            <div id="search-summary-title" class="text-xl font-black">-</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">已實現損益小計</span>
                            <div id="search-summary-pnl" class="text-2xl font-black">-</div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-[11px] text-left">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="py-3 px-3 border-b sort-header text-slate-500" onclick="setHistSort('date')">日期</th>
                                    <th class="py-3 px-3 border-b sort-header text-slate-500" onclick="setHistSort('name')">股票標的</th>
                                    <th class="py-3 px-3 border-b text-center text-slate-500">類型</th>
                                    <th class="py-3 px-3 border-b text-right text-slate-500 font-bold bg-slate-100/50">成交股數</th>
                                    <th class="py-3 px-3 border-b text-right text-slate-500 font-bold bg-slate-100/50">成交價</th>
                                    <th class="py-3 px-3 border-b text-right text-slate-500 font-bold bg-slate-100/50">成交總額</th>
                                    <th class="py-3 px-3 border-b text-right sort-header text-slate-500" onclick="setHistSort('pnl')">已實現損益</th>
                                    <th class="py-3 px-3 border-b text-center text-slate-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="history-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STOCK_MAP = { "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "1303": "南亞", "2408": "南亞科", "2881": "富邦金", "0050": "元大台灣50" };
        const KEYWORDS = {
            symbol: ['代號', '股票代號', '股號', 'Symbol'],
            name: ['名稱', '股票名稱', '公司名稱', 'Name'],
            type: ['類型', '動作', '交易類型', 'Type'],
            price: ['價格', '單價', '成交價', 'Price'],
            qty: ['股數', '數量', '張數', 'Qty'],
            date: ['日期', '交易日', 'Date']
        };

        let txs = JSON.parse(localStorage.getItem('light_stocks_v13')) || [];
        let capital = parseFloat(localStorage.getItem('light_capital_v13')) || 1000000;
        let historyStack = [];
        let invSortCol = 'cost'; let invSortDir = 'desc';
        let histSortCol = 'date'; let histSortDir = 'desc';
        let allocationChart = null; let performanceChart = null;

        window.onload = () => {
            document.getElementById('manual-capital').value = capital;
            document.getElementById('date').valueAsDate = new Date();
            lucide.createIcons();
            saveHistoryState();
            updateUI();
        };

        // --- Core Export Logic (Requested Change) ---
        function exportToExcel() {
            if (txs.length === 0) { alert("沒有資料可以匯出！"); return; }
            
            // 僅保留指定的六個欄位並中文化
            const exportData = txs.map(t => ({
                "日期": t.date,
                "名稱": t.name,
                "代號": t.symbol,
                "類型": t.type === 'buy' ? '買入' : '賣出',
                "股數": t.qty,
                "價格": t.price
            }));

            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "股票交易紀錄");
            XLSX.writeFile(workbook, `股票交易紀錄_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // --- Undo / Storage ---
        function saveHistoryState() { if (historyStack.length > 20) historyStack.shift(); historyStack.push(JSON.stringify(txs)); updateUndoBtn(); }
        function undo() { if (historyStack.length > 1) { historyStack.pop(); txs = JSON.parse(historyStack[historyStack.length - 1]); sync(); updateUI(); updateUndoBtn(); } }
        function updateUndoBtn() { document.getElementById('undo-btn').disabled = (historyStack.length <= 1); }
        function sync() { localStorage.setItem('light_stocks_v13', JSON.stringify(txs)); localStorage.setItem('light_capital_v13', capital); }

        // --- Sorting ---
        function setInvSort(col) { if (invSortCol === col) { invSortDir = invSortDir === 'asc' ? 'desc' : 'asc'; } else { invSortCol = col; invSortDir = 'desc'; } updateUI(); }
        function setHistSort(col) { if (histSortCol === col) { histSortDir = histSortDir === 'asc' ? 'desc' : 'asc'; } else { histSortCol = col; histSortDir = 'desc'; } updateUI(); }

        // --- Helpers ---
        function autoName(s) { if (STOCK_MAP[s]) document.getElementById('name').value = STOCK_MAP[s]; }
        function saveCapital() { capital = parseFloat(document.getElementById('manual-capital').value) || 0; sync(); updateUI(); }
        function setGlobalRange(d) { const end = new Date(); const start = new Date(); start.setDate(end.getDate() - d); document.getElementById('filter-start').valueAsDate = start; document.getElementById('filter-end').valueAsDate = end; updateUI(); }
        function resetGlobalDates() { document.getElementById('filter-start').value = ""; document.getElementById('filter-end').value = ""; updateUI(); }
        function cleanNum(val) { if (typeof val === 'number') return val; const cleaned = val.toString().replace(/[^\d.-]/g, ''); const parsed = parseFloat(cleaned); return isNaN(parsed) ? 0 : parsed; }

        // --- Import ---
        document.getElementById('excel-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                    rows.forEach((row, idx) => {
                        const cleanRow = {}; Object.keys(row).forEach(k => cleanRow[k.toString().trim()] = row[k]);
                        const findVal = (keys) => { const k = Object.keys(cleanRow).find(rk => keys.some(kk => rk.includes(kk))); return k ? cleanRow[k] : null; };
                        const sym = (findVal(KEYWORDS.symbol) || "").toString().trim();
                        if (sym) {
                            const p = cleanNum(findVal(KEYWORDS.price)); const q = Math.abs(parseInt(cleanNum(findVal(KEYWORDS.qty))));
                            const rt = (findVal(KEYWORDS.type) || "").toString();
                            const type = (rt.includes("賣") || rt.toLowerCase().includes("sell")) ? 'sell' : 'buy';
                            let dt = findVal(KEYWORDS.date); dt = dt instanceof Date ? dt.toISOString().split('T')[0] : (dt || new Date()).toString().replace(/\//g, '-');
                            txs.push({ id: Date.now() + idx, symbol: sym, name: (findVal(KEYWORDS.name) || STOCK_MAP[sym] || sym), type, date: dt, price: p, qty: q, fee: Math.max(1, Math.floor(p * q * 0.001425)), tax: type === 'sell' ? Math.floor(p * q * 0.003) : 0 });
                        }
                    });
                    saveHistoryState(); sync(); updateUI();
                } catch (err) { alert("匯入失敗"); }
            };
            reader.readAsBinaryString(file);
            e.target.value = "";
        });

        document.getElementById('tx-form').onsubmit = (e) => {
            e.preventDefault();
            const p = parseFloat(document.getElementById('price').value); const q = parseInt(document.getElementById('qty').value); const type = document.getElementById('type').value;
            txs.push({ id: Date.now(), symbol: document.getElementById('symbol').value, name: document.getElementById('name').value, type, date: document.getElementById('date').value, price: p, qty: q, fee: Math.max(1, Math.floor(p * q * 0.001425)), tax: type === 'sell' ? Math.floor(p * q * 0.003) : 0 });
            saveHistoryState(); sync(); updateUI(); e.target.reset(); document.getElementById('date').valueAsDate = new Date();
        };

        // --- Core UI & Logic ---
        function updateUI() {
            txs.sort((a,b) => new Date(a.date) - new Date(b.date));
            const portfolio = {}; let globalRealized = 0; const fullHistory = [];
            const gStart = document.getElementById('filter-start').value; const gEnd = document.getElementById('filter-end').value;

            txs.forEach(t => {
                if (!portfolio[t.symbol]) portfolio[t.symbol] = { qty: 0, cost: 0, name: t.name, realized: 0 };
                const p = portfolio[t.symbol]; let txPnl = null;
                if (t.type === 'buy') { p.qty += t.qty; p.cost += (t.price * t.qty) + t.fee; }
                else {
                    const avg = p.qty > 0 ? (p.cost / p.qty) : t.price;
                    txPnl = (t.price * t.qty) - t.fee - t.tax - (avg * t.qty);
                    p.realized += txPnl;
                    const tDate = new Date(t.date);
                    if ((!gStart || tDate >= new Date(gStart)) && (!gEnd || tDate <= new Date(gEnd))) globalRealized += txPnl;
                    p.qty -= t.qty; p.cost -= (avg * t.qty);
                }
                fullHistory.push({ ...t, pnl: txPnl });
            });

            // 1. Inventory Logic & Sorting
            let invArray = Object.keys(portfolio).map(s => ({ symbol: s, ...portfolio[s] })).filter(d => d.qty > 0);
            invArray.sort((a, b) => {
                let vA = a[invSortCol], vB = b[invSortCol];
                if (invSortCol === 'name') return invSortDir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
                return invSortDir === 'asc' ? vA - vB : vB - vA;
            });

            const invBody = document.getElementById('inventory-body'); invBody.innerHTML = '';
            let totalInvCost = 0; const al = [], ad = [], pl = [], pd = [];
            invArray.forEach(d => {
                totalInvCost += d.cost;
                invBody.innerHTML += `<tr class="border-b hover:bg-slate-50 transition"><td class="py-4 px-2 font-bold">${d.name}<br><span class="text-[10px] text-slate-400">${d.symbol}</span></td><td class="py-4 px-2 text-right font-medium">${d.qty.toLocaleString()}</td><td class="py-4 px-2 text-right text-slate-500">${(d.cost/d.qty).toFixed(2)}</td><td class="py-4 px-2 text-right font-black text-slate-800">$${Math.round(d.cost).toLocaleString()}</td></tr>`;
                al.push(d.name); ad.push(Math.round(d.cost));
            });
            Object.values(portfolio).forEach(d => { if(Math.abs(d.realized)>1){ pl.push(d.name); pd.push(Math.round(d.realized)); } });
            drawCharts(al, ad, pl, pd);

            // 2. History Filter Logic
            const hKeyword = document.getElementById('hist-search').value.trim(); const hStart = document.getElementById('hist-start').value; const hEnd = document.getElementById('hist-end').value; const exact = document.getElementById('exact-match').checked;
            let filtered = fullHistory.filter(t => {
                let mK = hKeyword ? (exact ? (t.name === hKeyword || t.symbol === hKeyword) : (t.symbol.includes(hKeyword) || t.name.includes(hKeyword))) : true;
                const tDate = new Date(t.date); const mS = !hStart || tDate >= new Date(hStart); const mE = !hEnd || tDate <= new Date(hEnd);
                return mK && mS && mE;
            });

            const searchPnl = filtered.reduce((s, t) => s + (t.pnl || 0), 0);
            const summary = document.getElementById('search-summary');
            if (hKeyword || hStart || hEnd) {
                summary.classList.remove('hidden'); document.getElementById('search-summary-title').innerText = hKeyword ? `查詢: ${hKeyword}` : "深度分析";
                const pnlEl = document.getElementById('search-summary-pnl'); pnlEl.innerText = `$${Math.round(searchPnl).toLocaleString()}`;
                pnlEl.className = `text-2xl font-black ${searchPnl >= 0 ? 'text-rose-500' : 'text-emerald-400'}`;
            } else { summary.classList.add('hidden'); }

            filtered.sort((a, b) => {
                let vA, vB;
                if (histSortCol === 'date') { vA = new Date(a.date); vB = new Date(b.date); }
                else if (histSortCol === 'name') { vA = a.name; vB = b.name; }
                else if (histSortCol === 'pnl') { vA = a.pnl || -9999999; vB = b.pnl || -9999999; }
                return histSortDir === 'asc' ? (vA < vB ? -1 : 1) : (vA > vB ? -1 : 1);
            });

            const histBody = document.getElementById('history-body'); histBody.innerHTML = '';
            filtered.forEach(t => {
                histBody.innerHTML += `<tr class="hover:bg-slate-50 transition border-b border-slate-50"><td class="py-3 px-3 text-slate-500">${t.date}</td><td class="py-3 px-3 font-bold">${t.name}</td><td class="py-3 px-3 text-center"><span class="px-2 py-0.5 rounded text-[9px] font-bold ${t.type==='buy'?'bg-rose-50 text-rose-600':'bg-emerald-50 text-emerald-600'}">${t.type==='buy'?'買入':'賣出'}</span></td><td class="py-3 px-3 text-right font-medium bg-slate-50/30">${t.qty.toLocaleString()}</td><td class="py-3 px-3 text-right font-medium bg-slate-50/30">${t.price.toFixed(2)}</td><td class="py-3 px-3 text-right font-bold bg-slate-50/50">$${Math.round(t.price * t.qty).toLocaleString()}</td><td class="py-3 px-3 text-right font-bold ${t.pnl>=0?'pos-text':'neg-text'}">${t.pnl!==null?Math.round(t.pnl).toLocaleString():'-'}</td><td class="py-3 px-3 text-center"><button onclick="delTx(${t.id})" class="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button></td></tr>`;
            });

            document.getElementById('total-inventory-cost').innerText = `$${Math.round(totalInvCost).toLocaleString()}`;
            document.getElementById('realized-pnl').innerText = `$${Math.round(globalRealized).toLocaleString()}`;
            document.getElementById('realized-pnl').className = `text-3xl font-black ${globalRealized >= 0 ? 'pos-text' : 'neg-text'}`;
            const roi = capital > 0 ? (globalRealized / capital) * 100 : 0;
            document.getElementById('total-roi').innerText = `${roi.toFixed(2)}%`;
            document.getElementById('total-roi').className = `text-3xl font-black ${roi >= 0 ? 'pos-text' : 'neg-text'}`;
            lucide.createIcons();
        }

        function drawCharts(al, ad, pl, pd) {
            const ctx1 = document.getElementById('allocationChart').getContext('2d');
            const ctx2 = document.getElementById('performanceChart').getContext('2d');
            if (allocationChart) allocationChart.destroy(); if (performanceChart) performanceChart.destroy();
            allocationChart = new Chart(ctx1, { type: 'doughnut', data: { labels: al, datasets: [{ data: ad, backgroundColor: ['#4f46e5','#f43f5e','#10b981','#f59e0b','#6366f1','#ec4899','#8b5cf6'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } } } });
            performanceChart = new Chart(ctx2, { type: 'bar', data: { labels: pl, datasets: [{ data: pd, backgroundColor: pd.map(v => v >= 0 ? 'rgba(225, 29, 72, 0.7)' : 'rgba(16, 185, 129, 0.7)'), borderRadius: 4 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { display: false }, ticks: { font: { size: 9 } } }, x: { grid: { display: false }, ticks: { font: { size: 9 } } } } } });
        }

        function delTx(id) { if (confirm('確定刪除紀錄？')) { saveHistoryState(); txs = txs.filter(t => t.id !== id); sync(); updateUI(); } }
        function clearSystem() { if (confirm('警告：將清除所有數據！')) { saveHistoryState(); txs = []; localStorage.clear(); updateUI(); } }
    </script>
</body>
</html>
