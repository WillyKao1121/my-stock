<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest Pro | 官方數據穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profit { color: #ef4444; } .loss { color: #10b981; }
        .editable:hover { background-color: #fef9c3; cursor: pointer; border-radius: 4px; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">投資資產看板</h1>
                <p id="statusInfo" class="text-xs text-slate-400 mt-1 font-mono">官方數據連線：待機中</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportCSV()" class="bg-white border px-4 py-2 rounded-xl text-sm hover:bg-slate-50 transition">匯出 CSV</button>
                <button id="btnUpdate" onclick="updateTWPrices()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm flex items-center shadow-lg transition">
                    <i id="refreshIcon" class="fas fa-sync-alt mr-2"></i>更新台股現價
                </button>
                <button onclick="toggleModal()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-sm font-bold">
                    + 新增交易
                </button>
            </div>
        </header>

        <!-- 資產統計 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-6 border-t-4 border-blue-500">
                <div class="text-slate-400 text-xs font-bold mb-1">資產總市值</div>
                <div id="totalValue" class="text-3xl font-bold">$0</div>
            </div>
            <div class="card p-6 border-t-4 border-red-500">
                <div class="text-slate-400 text-xs font-bold mb-1">未實現損益</div>
                <div id="totalUnrealized" class="text-3xl font-bold">$0</div>
            </div>
            <div class="card p-6 border-t-4 border-slate-700">
                <div class="text-slate-400 text-xs font-bold mb-1">已實現損益</div>
                <div id="totalRealized" class="text-3xl font-bold text-slate-700">$0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <!-- 庫存表格 -->
                <div class="card overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-[10px] text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-4">股票</th>
                                <th class="px-6 py-4 text-right">股數</th>
                                <th class="px-6 py-4 text-right">成本</th>
                                <th class="px-6 py-4 text-right text-blue-600">目前現價</th>
                                <th class="px-6 py-4 text-right">損益</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>

                <!-- 歷史紀錄 (縮小顯示) -->
                <div class="card p-4">
                    <h3 class="text-xs font-bold text-slate-400 mb-2 uppercase">近期交易</h3>
                    <div id="historySummary" class="text-[10px] text-slate-500 space-y-1"></div>
                </div>
            </div>

            <!-- 配置圖表 -->
            <div class="lg:col-span-1">
                <div class="card p-8 flex flex-col items-center">
                    <h3 class="font-bold text-slate-700 mb-8 text-sm">資產配置比重</h3>
                    <div class="w-full relative h-[300px]">
                        <canvas id="allocationChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-6">新增交易紀錄</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">股票代號 (台股請輸入 4 位數字)</label>
                    <input type="text" id="symbol" class="w-full border p-3 rounded-xl uppercase outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 2330">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="type" class="w-full border p-3 rounded-xl bg-white text-sm">
                        <option value="buy">買進 (+)</option>
                        <option value="sell">賣出 (-)</option>
                    </select>
                    <input type="date" id="date" class="w-full border p-3 rounded-xl text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="qty" class="w-full border p-3 rounded-xl" placeholder="股數">
                    <input type="number" id="price" class="w-full border p-3 rounded-xl" placeholder="單價">
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="toggleModal()" class="flex-1 py-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition">取消</button>
                    <button onclick="addTrade()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let currentPrices = JSON.parse(localStorage.getItem('currentPrices')) || {};
        let myChart = null;

        document.getElementById('date').valueAsDate = new Date();

        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }

        function addTrade() {
            const sym = document.getElementById('symbol').value.toUpperCase().trim();
            const qty = parseFloat(document.getElementById('qty').value);
            const price = parseFloat(document.getElementById('price').value);
            const type = document.getElementById('type').value;

            if(!sym || isNaN(qty) || isNaN(price)) return alert("請完整填寫資訊");

            if(type === 'sell') {
                const { portfolio } = calculatePortfolio();
                if((portfolio[sym]?.qty || 0) < qty) return alert("❌ 庫存股數不足");
            }

            trades.push({ id: Date.now(), symbol: sym, type, qty, price, date: document.getElementById('date').value });
            localStorage.setItem('trades', JSON.stringify(trades));
            toggleModal();
            render();
        }

        // --- 證交所官方 API 抓取邏輯 (全台股一次抓取) ---
        async function updateTWPrices() {
            const btn = document.getElementById('btnUpdate');
            const icon = document.getElementById('refreshIcon');
            const status = document.getElementById('statusInfo');
            
            btn.disabled = true;
            icon.classList.add('spin');
            status.innerText = "正在連線證交所官方開放資料庫...";

            try {
                // 證交所 API：個股日收盤價平均值 (這是最穩定的官方開放 API)
                const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL');
                if (!res.ok) throw new Error("證交所伺服器回應錯誤");
                
                const data = await res.json();
                
                // 將資料轉換為簡單的物件方便查詢
                const priceMap = {};
                data.forEach(item => {
                    // item.Code 是股票代號, item.ClosingPrice 是收盤價
                    priceMap[item.Code] = parseFloat(item.ClosingPrice);
                });

                // 更新現有庫存的價格
                const { portfolio } = calculatePortfolio();
                let updateCount = 0;
                for (let sym in portfolio) {
                    if (priceMap[sym]) {
                        currentPrices[sym] = priceMap[sym];
                        updateCount++;
                    }
                }

                localStorage.setItem('currentPrices', JSON.stringify(currentPrices));
                status.innerText = `更新完成！已同步 ${updateCount} 檔台股價格。`;
            } catch (e) {
                console.error(e);
                status.innerText = "更新失敗，請檢查網路或稍後再試。";
                alert("無法連線官方 API，可能因為非交易時間。您仍可手動點擊藍色現價修改。");
            } finally {
                btn.disabled = false;
                icon.classList.remove('spin');
                render();
            }
        }

        function calculatePortfolio() {
            const portfolio = {};
            let totalRealized = 0;
            const sorted = [...trades].sort((a,b) => new Date(a.date) - new Date(b.date));
            
            sorted.forEach(t => {
                if(!portfolio[t.symbol]) portfolio[t.symbol] = {qty:0, cost:0};
                const p = portfolio[t.symbol];
                if(t.type === 'buy') {
                    p.qty += t.qty;
                    p.cost += (t.qty * t.price);
                } else {
                    const avg = p.cost / p.qty;
                    totalRealized += (t.price - avg) * t.qty;
                    p.qty -= t.qty;
                    p.cost -= (avg * t.qty);
                }
            });
            return { portfolio, totalRealized };
        }

        function render() {
            const { portfolio, totalRealized } = calculatePortfolio();
            const body = document.getElementById('inventoryBody');
            const historyDiv = document.getElementById('historySummary');
            body.innerHTML = '';
            historyDiv.innerHTML = '';

            let totalMV = 0, totalUV = 0;
            const labels = [], values = [];

            // 庫存列表
            for(const s in portfolio) {
                const d = portfolio[s];
                if(d.qty <= 0) continue;

                const avg = d.cost / d.qty;
                const cur = currentPrices[s] || avg;
                const mv = d.qty * cur;
                const uv = (cur - avg) * d.qty;
                const rate = ((cur/avg-1)*100).toFixed(2);
                
                totalMV += mv; totalUV += uv;
                labels.push(s); values.push(mv.toFixed(0));

                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4 font-bold text-slate-800">${s}</td>
                        <td class="px-6 py-4 text-right">${d.qty.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-slate-400">$${avg.toFixed(2)}</td>
                        <td class="px-6 py-4 text-right text-blue-600 font-bold editable" onclick="manualUpdate('${s}')">$${cur.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right font-bold ${uv>=0?'profit':'loss'}">
                            ${uv>=0?'+':''}${uv.toLocaleString(undefined,{maximumFractionDigits:0})}
                            <div class="text-[9px] font-normal opacity-60">${rate}%</div>
                        </td>
                    </tr>`;
            }

            // 歷史紀錄摘要
            trades.slice(-5).reverse().forEach(t => {
                historyDiv.innerHTML += `<div>${t.date} | ${t.symbol} | ${t.type === 'buy'?'買入':'賣出'} ${t.qty}股 @ $${t.price}</div>`;
            });

            document.getElementById('totalValue').innerText = `$${totalMV.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('totalUnrealized').innerText = `$${totalUV.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('totalUnrealized').className = `text-3xl font-bold ${totalUV>=0?'profit':'loss'}`;
            document.getElementById('totalRealized').innerText = `$${totalRealized.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            
            updateChart(labels, values);
        }

        function manualUpdate(s) {
            const p = prompt(`請輸入 ${s} 的目前市價:`, currentPrices[s] || "");
            if(p !== null && !isNaN(parseFloat(p))) { 
                currentPrices[s] = parseFloat(p); 
                localStorage.setItem('currentPrices', JSON.stringify(currentPrices));
                render(); 
            }
        }

        function updateChart(labels, values) {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if(myChart) myChart.destroy();
            if(labels.length === 0) return;
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#64748b'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '75%' }
            });
        }

        function exportCSV() {
            if(trades.length === 0) return alert("無資料");
            let csv = "\uFEFF日期,股票,種類,股數,價格\n";
            trades.forEach(t => csv += `${t.date},${t.symbol},${t.type},${t.qty},${t.price}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `投資備份_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        render();
    </script>
</body>
</html>
