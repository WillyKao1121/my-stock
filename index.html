<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest Pro | V2.5 強效連線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profit { color: #ef4444; } .loss { color: #10b981; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">投資資產看板</h1>
                <div id="apiStatus" class="text-xs font-mono mt-1 text-slate-400">系統就緒 | 無需 API Key</div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="exportCSV()" class="bg-white border px-4 py-2 rounded-xl text-sm">匯出 CSV</button>
                <button onclick="openBulkUpdate()" class="bg-slate-100 px-4 py-2 rounded-xl text-sm hover:bg-slate-200">大量改價</button>
                <button id="btnUpdate" onclick="updateAllPrices()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm flex items-center shadow-lg transition">
                    <i id="refreshIcon" class="fas fa-sync-alt mr-2"></i>更新現價
                </button>
                <button onclick="toggleModal()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">
                    + 新增交易
                </button>
            </div>
        </header>

        <!-- 數據總覽 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center md:text-left">
            <div class="card p-6 border-t-4 border-blue-500">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase">資產總市值</div>
                <div id="totalValue" class="text-3xl font-bold">$0</div>
            </div>
            <div class="card p-6 border-t-4 border-red-500">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase">未實現損益</div>
                <div id="totalUnrealized" class="text-3xl font-bold">$0</div>
            </div>
            <div class="card p-6 border-t-4 border-emerald-500">
                <div class="text-slate-400 text-xs font-bold mb-1 uppercase">已實現損益</div>
                <div id="totalRealized" class="text-3xl font-bold text-slate-700">$0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="px-6 py-5">股票</th>
                                    <th class="px-6 py-5 text-right">股數</th>
                                    <th class="px-6 py-5 text-right">平均成本</th>
                                    <th class="px-6 py-5 text-right text-blue-600">目前現價</th>
                                    <th class="px-6 py-5 text-right">損益 (%)</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-1">
                <div class="card p-8 flex flex-col items-center min-h-[400px]">
                    <h3 class="font-bold text-slate-700 mb-8 text-sm">資產比例 (按市值)</h3>
                    <div class="w-full relative flex-grow"><canvas id="allocationChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 大量更新彈窗 -->
    <div id="bulkUpdateModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4">大量修改價格</h3>
            <p class="text-xs text-slate-500 mb-4">格式：股票代號,價格 (每行一筆)，例如：<br>2330.TW,600<br>AAPL,180</p>
            <textarea id="bulkData" class="w-full border p-4 rounded-xl font-mono text-sm h-48 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="2330.TW,605.0"></textarea>
            <div class="flex gap-2 mt-6">
                <button onclick="closeBulkUpdate()" class="flex-1 py-3 bg-slate-100 rounded-xl">取消</button>
                <button onclick="saveBulkUpdate()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">確認更新</button>
            </div>
        </div>
    </div>

    <!-- 新增交易彈窗 (同前) -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-800">新增成交紀錄</h3>
            <div class="space-y-4">
                <input type="text" id="symbol" class="w-full border p-4 rounded-xl uppercase outline-none focus:border-blue-500" placeholder="代號 (如: 2330)">
                <div class="grid grid-cols-2 gap-4">
                    <select id="market" class="w-full border p-4 rounded-xl bg-white text-sm">
                        <option value=".TW">台股上市 (.TW)</option>
                        <option value=".TWO">台股上櫃 (.TWO)</option>
                        <option value="">美股 (無後綴)</option>
                    </select>
                    <select id="type" class="w-full border p-4 rounded-xl bg-white text-sm">
                        <option value="buy">買進 (+)</option>
                        <option value="sell">賣出 (-)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="qty" class="w-full border p-4 rounded-xl" placeholder="股數">
                    <input type="number" id="price" class="w-full border p-4 rounded-xl" placeholder="單價">
                </div>
                <input type="date" id="date" class="w-full border p-4 rounded-xl text-sm">
                <div class="flex gap-2 pt-4">
                    <button onclick="toggleModal()" class="flex-1 py-4 bg-slate-50 rounded-xl hover:bg-slate-100">取消</button>
                    <button onclick="addTrade()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let currentPrices = JSON.parse(localStorage.getItem('currentPrices')) || {};
        let myChart = null;

        document.getElementById('date').valueAsDate = new Date();

        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }
        function openBulkUpdate() { document.getElementById('bulkUpdateModal').classList.remove('hidden'); }
        function closeBulkUpdate() { document.getElementById('bulkUpdateModal').classList.add('hidden'); }

        function addTrade() {
            const sym = document.getElementById('symbol').value.toUpperCase().trim();
            const mkt = document.getElementById('market').value;
            const fullSymbol = /^\d+$/.test(sym) ? sym + mkt : sym;
            const qty = parseFloat(document.getElementById('qty').value);
            const price = parseFloat(document.getElementById('price').value);

            if(!fullSymbol || isNaN(qty) || isNaN(price)) return alert("資料填寫不完整");

            trades.push({ id: Date.now(), symbol: fullSymbol, type: document.getElementById('type').value, qty, price, date: document.getElementById('date').value });
            localStorage.setItem('trades', JSON.stringify(trades));
            toggleModal();
            render();
        }

        // --- 強效更新邏輯 ---
        async function updateAllPrices() {
            const { portfolio } = calculatePortfolio();
            const symbols = Object.keys(portfolio).filter(s => portfolio[s].qty > 0);
            if(symbols.length === 0) return alert("目前無庫存");

            const btn = document.getElementById('btnUpdate');
            const icon = document.getElementById('refreshIcon');
            const apiStatus = document.getElementById('apiStatus');

            btn.disabled = true;
            icon.classList.add('spin');
            apiStatus.innerText = "連線中...";

            let count = 0;
            for(let s of symbols) {
                apiStatus.innerText = `正在抓取 ${s}...`;
                try {
                    // 使用新的穩定 Proxy: corsproxy.io
                    const url = `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s}`)}`;
                    const res = await fetch(url);
                    if(!res.ok) throw new Error("Proxy 拒絕連線");
                    const data = await res.json();
                    const price = data.chart.result[0].meta.regularMarketPrice;
                    if(price) {
                        currentPrices[s] = price;
                        count++;
                    }
                } catch (e) {
                    console.error(`${s} 更新失敗:`, e);
                }
                await new Promise(r => setTimeout(r, 600)); // 避免被 Yahoo 封鎖
            }

            localStorage.setItem('currentPrices', JSON.stringify(currentPrices));
            apiStatus.innerText = `更新完成，成功抓取 ${count} 筆現價`;
            btn.disabled = false;
            icon.classList.remove('spin');
            render();
        }

        function saveBulkUpdate() {
            const text = document.getElementById('bulkData').value;
            const lines = text.split('\n');
            lines.forEach(line => {
                const [sym, price] = line.split(',');
                if(sym && price) currentPrices[sym.trim().toUpperCase()] = parseFloat(price.trim());
            });
            localStorage.setItem('currentPrices', JSON.stringify(currentPrices));
            closeBulkUpdate();
            render();
            alert("價格已更新！");
        }

        // --- 計算與渲染 ---
        function calculatePortfolio() {
            const portfolio = {};
            let totalRealized = 0;
            [...trades].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t => {
                if(!portfolio[t.symbol]) portfolio[t.symbol] = {qty:0, cost:0};
                const p = portfolio[t.symbol];
                if(t.type === 'buy') { p.qty += t.qty; p.cost += (t.qty * t.price); }
                else {
                    const avg = p.cost / p.qty;
                    totalRealized += (t.price - avg) * t.qty;
                    p.qty -= t.qty; p.cost -= (avg * t.qty);
                }
            });
            return { portfolio, totalRealized };
        }

        function render() {
            const { portfolio, totalRealized } = calculatePortfolio();
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '';
            let totalMV = 0, totalUV = 0;
            const labels = [], values = [];

            for(const s in portfolio) {
                const d = portfolio[s];
                if(d.qty <= 0) continue;
                const avg = d.cost / d.qty;
                const cur = currentPrices[s] || avg;
                const mv = d.qty * cur;
                const uv = (cur - avg) * d.qty;
                const rate = ((cur/avg-1)*100).toFixed(2);
                
                totalMV += mv; totalUV += uv;
                labels.push(s); values.push(mv.toFixed(0));

                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-5 font-bold text-slate-700">${s}</td>
                        <td class="px-6 py-5 text-right font-medium">${d.qty.toLocaleString()}</td>
                        <td class="px-6 py-5 text-right text-slate-400">$${avg.toFixed(2)}</td>
                        <td class="px-6 py-5 text-right text-blue-600 font-bold cursor-pointer" onclick="manualPrice('${s}')">$${cur.toLocaleString()}</td>
                        <td class="px-6 py-5 text-right font-bold ${uv>=0?'profit':'loss'}">
                            ${uv>=0?'+':''}${uv.toLocaleString(undefined,{maximumFractionDigits:0})}
                            <div class="text-[10px] font-normal opacity-70">${rate}%</div>
                        </td>
                    </tr>`;
            }

            document.getElementById('totalValue').innerText = `$${totalMV.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('totalUnrealized').innerText = `$${totalUV.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('totalUnrealized').className = `text-3xl font-bold ${totalUV>=0?'profit':'loss'}`;
            document.getElementById('totalRealized').innerText = `$${totalRealized.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            
            updateChart(labels, values);
        }

        function manualPrice(s) {
            const p = prompt(`手動輸入 ${s} 現價:`, currentPrices[s] || "");
            if(p && !isNaN(p)) { currentPrices[s] = parseFloat(p); localStorage.setItem('currentPrices', JSON.stringify(currentPrices)); render(); }
        }

        function updateChart(labels, values) {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if(myChart) myChart.destroy();
            if(labels.length === 0) return;
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#64748b','#94a3b8'], borderWidth: 4, borderColor: '#ffffff' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 20, font: { size: 11 } } } }, cutout: '75%' }
            });
        }

        function exportCSV() {
            let csv = "\uFEFF日期,股票,種類,股數,單價\n";
            trades.forEach(t => csv += `${t.date},${t.symbol},${t.type === 'buy'?'買進':'賣出'},${t.qty},${t.price}\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "投資組合備份.csv"; link.click();
        }

        render();
    </script>
</body>
</html>
